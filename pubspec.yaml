name: actiderm
description: ActiDerm — on-device AI skin tracking for iOS & Android.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  go_router: ^14.6.3

  uuid: ^4.5.1

  drift: ^2.22.1
